name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Queue deploys — never cancel a running deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Force all actions to use Node.js 24 (Node.js 20 removed Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Runs cf-typegen (generates worker-configuration.d.ts from wrangler.jsonc)
      # + react-router typegen (generates .react-router/types/**/*) + tsc -b
      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # DOMAINS comes from a GitHub Actions Variable (Settings → Variables → Actions).
      # Falls back to 'example.com' if not yet set — change it before first real deploy.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --var "DOMAINS:${{ vars.DOMAINS || 'example.com' }}"

      # Re-apply Cloudflare Access secrets on every deploy so they survive code updates.
      # These are set once via: ./scripts/setup.sh --access
      # If the secrets are not yet configured (Access not enabled) this step is a no-op.
      - name: Apply Access secrets (if configured)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          POLICY_AUD: ${{ secrets.POLICY_AUD }}
          TEAM_DOMAIN: ${{ secrets.TEAM_DOMAIN }}
        run: |
          if [ -n "$POLICY_AUD" ]; then
            printf '%s' "$POLICY_AUD" | npx wrangler versions secret put POLICY_AUD
            echo "✓ POLICY_AUD applied"
          fi
          if [ -n "$TEAM_DOMAIN" ]; then
            printf '%s' "$TEAM_DOMAIN" | npx wrangler versions secret put TEAM_DOMAIN
            echo "✓ TEAM_DOMAIN applied"
          fi
