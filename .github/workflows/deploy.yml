name: Deploy to Cloudflare Workers

# Runs automatically on every push to main.
# Can also be triggered manually from the Actions tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Queue deploys — never cancel a running deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Force all actions to use Node.js 24 (Node.js 20 removed Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Deploy the worker. DOMAINS comes from a GitHub Actions Variable (not a secret).
      # This step always runs — POLICY_AUD / TEAM_DOMAIN are handled separately below.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --var "DOMAINS:${{ vars.DOMAINS || 'example.com' }}"

      # Set Cloudflare Access secrets — only runs once they are configured in GitHub.
      # To configure: run ./scripts/setup.sh --access after enabling Access on the Worker.
      - name: Set Access secrets
        if: ${{ env.POLICY_AUD != '' && env.TEAM_DOMAIN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            POLICY_AUD
            TEAM_DOMAIN
        env:
          POLICY_AUD: ${{ secrets.POLICY_AUD }}
          TEAM_DOMAIN: ${{ secrets.TEAM_DOMAIN }}
