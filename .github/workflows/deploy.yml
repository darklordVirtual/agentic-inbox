name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Queue deploys — never cancel a running deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Force all actions to use Node.js 24 (Node.js 20 removed Sep 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Runs cf-typegen (generates worker-configuration.d.ts from wrangler.jsonc)
      # + react-router typegen (generates .react-router/types/**/*) + tsc -b
      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      # DOMAINS comes from a GitHub Actions Variable (Settings → Variables → Actions).
      # Falls back to 'example.com' if not yet set — change it before first real deploy.
      # POLICY_AUD and TEAM_DOMAIN are set once via: ./scripts/setup.sh --access
      # They persist in the Worker and do not need to be reapplied on every deploy.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --var "DOMAINS:${{ vars.DOMAINS || 'example.com' }}"
